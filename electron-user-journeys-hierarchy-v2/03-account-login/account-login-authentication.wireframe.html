<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Journey 3: Login / Account Authentication Wireframe</title>
<style>
:root {
  --bg: #eef3f7;
  --grid: #d9e2ea;
  --ink: #1f2933;
  --muted: #667789;
  --line: #c6d0da;
  --panel: #ffffff;
  --soft: #f7f9fb;
  --blue: #2d77b8;
  --blue-soft: #e5f1fb;
  --green: #1f8a52;
  --green-soft: #e7f6ed;
  --amber: #9a6a1f;
  --amber-soft: #fff3d4;
  --red: #a43c3c;
  --red-soft: #fde8e8;
  --shell: #f6f3ed;
  --shell-line: #ded7cd;
  --sidebar: #eee8df;
}
* { box-sizing: border-box; }
html,
body {
  height: 100%;
  margin: 0;
  overflow: hidden;
  color: var(--ink);
  background: var(--bg);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
button { font: inherit; }
.topbar {
  position: fixed;
  inset: 0 0 auto 0;
  z-index: 20;
  height: 72px;
  display: flex;
  align-items: center;
  gap: 18px;
  padding: 14px 18px;
  background: rgba(255, 255, 255, .94);
  border-bottom: 1px solid var(--line);
  backdrop-filter: blur(10px);
}
.topbar h1 {
  margin: 0;
  font-size: 19px;
  line-height: 1.1;
  white-space: nowrap;
}
.topbar p {
  min-width: 240px;
  margin: 0;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.35;
}
.controls {
  margin-left: auto;
  display: flex;
  gap: 8px;
}
.controls button {
  min-width: 42px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 8px 11px;
  background: #fff;
  color: var(--ink);
  font-weight: 800;
  cursor: pointer;
}
.shell {
  height: 100%;
  padding-top: 72px;
  display: grid;
  grid-template-columns: 272px 1fr;
}
.jump {
  overflow: auto;
  border-right: 1px solid var(--line);
  background: rgba(255, 255, 255, .78);
  padding: 18px 14px 28px;
}
.jump h2 {
  margin: 0 0 12px;
  color: #536272;
  font-size: 12px;
  letter-spacing: .08em;
  text-transform: uppercase;
}
.jump a {
  display: block;
  margin: 8px 0;
  padding: 9px 10px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  color: var(--ink);
  text-decoration: none;
  font-size: 12px;
  font-weight: 800;
  line-height: 1.25;
}
.jump small {
  display: block;
  margin-top: 3px;
  color: var(--muted);
  font-weight: 600;
}
.viewport {
  position: relative;
  overflow: hidden;
  cursor: grab;
  touch-action: none;
  overscroll-behavior: contain;
}
.viewport.dragging {
  cursor: grabbing;
  user-select: none;
}
.stage {
  position: absolute;
  left: 0;
  top: 0;
  width: 9200px;
  min-height: 14200px;
  padding: 32px 54px 72px;
  transform-origin: 0 0;
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 40px 40px;
}
.band {
  position: relative;
  margin: 0 0 42px;
  padding: 76px 0 32px;
  border-top: 2px solid rgba(31, 41, 51, .2);
}
.band-title {
  position: absolute;
  top: 18px;
  left: 0;
  display: flex;
  gap: 14px;
  align-items: baseline;
}
.band-title h2 {
  margin: 0;
  font-size: 22px;
}
.band-title p {
  max-width: 1180px;
  margin: 0;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.35;
}
.route-row {
  position: relative;
  margin: 0 0 30px;
  padding: 54px 0 18px;
}
.route-title {
  position: absolute;
  left: 0;
  top: 0;
  display: flex;
  gap: 12px;
  align-items: baseline;
}
.route-title h2 {
  margin: 0;
  font-size: 18px;
}
.route-title p {
  max-width: 1120px;
  margin: 0;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.35;
}
.route-flow {
  display: flex;
  align-items: stretch;
  gap: 18px;
}
.arrow {
  width: 32px;
  min-width: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #748599;
  font-size: 25px;
  font-weight: 900;
}
.card {
  width: 560px;
  min-width: 560px;
  min-height: 548px;
  padding: 12px;
  border: 1.5px solid #1f2933;
  border-top: 7px solid var(--blue);
  border-radius: 8px;
  background: #fff;
  box-shadow: 0 13px 28px rgba(30, 41, 59, .13);
}
.card.error { border-top-color: var(--red); }
.card.success { border-top-color: var(--green); }
.card.waiting { border-top-color: var(--amber); }
.card-head {
  min-height: 54px;
  display: flex;
  justify-content: space-between;
  gap: 10px;
}
.card-head h3 {
  margin: 0;
  font-size: 15px;
  line-height: 1.18;
}
.badges {
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-end;
  gap: 5px;
}
.badge {
  display: inline-flex;
  align-items: center;
  height: 22px;
  border-radius: 999px;
  padding: 0 8px;
  background: var(--blue-soft);
  color: #1b5f96;
  font-size: 10px;
  font-weight: 900;
  white-space: nowrap;
}
.badge.green { background: var(--green-soft); color: var(--green); }
.badge.red { background: var(--red-soft); color: var(--red); }
.badge.amber { background: var(--amber-soft); color: var(--amber); }
.screen {
  height: 386px;
  margin-top: 8px;
  overflow: hidden;
  border: 1px solid #d7e0e8;
  border-radius: 8px;
  background: #fbfaf7;
}
.state-panel {
  min-height: 386px;
  margin-top: 8px;
  padding: 12px;
  border: 1px solid #d7e0e8;
  border-radius: 8px;
  background: #fbfaf7;
}
.route-list,
.copy-list {
  display: grid;
  gap: 10px;
}
.route-item,
.copy-row {
  min-height: 58px;
  padding: 10px 12px;
  border: 1px solid #dde5ed;
  border-radius: 8px;
  background: #fff;
}
.route-item strong,
.copy-row strong {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 5px;
  font-size: 12px;
}
.route-item p,
.copy-row span,
.state-panel .notes {
  margin: 0;
  color: #546273;
  font-size: 12px;
  line-height: 1.38;
}
.state-panel .notes {
  padding-left: 18px;
}
.state-panel .notes li {
  margin: 0 0 8px;
}
.legacy-screen {
  background: #fff;
}
.legacy-desktop {
  width: 1200px;
  height: 940px;
  transform: scale(.445);
  transform-origin: top left;
  background: #fff;
}
.legacy-login-window {
  width: 1200px;
  height: 940px;
  display: grid;
  place-items: center;
  background: #fff;
  border: 1px solid #e4e4e4;
  box-shadow: 0 20px 54px rgba(35,31,27,.15);
}
.legacy-login-form {
  width: 520px;
  display: grid;
  gap: 24px;
  transform: translateY(-8px);
}
.legacy-login-form h5 {
  margin: 0 0 18px;
  text-align: center;
  font-size: 35px;
  line-height: 1.1;
  font-weight: 850;
}
.legacy-auth-btn {
  height: 58px;
  border: 0;
  border-radius: 9px;
  background: #171717;
  color: #fff;
  font-size: 21px;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 18px;
}
.legacy-divider {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 18px;
  color: #686868;
  font-size: 20px;
}
.legacy-divider:before,
.legacy-divider:after {
  content: "";
  height: 1px;
  background: #d7d7d7;
}
.legacy-field {
  display: grid;
  gap: 10px;
  font-size: 18px;
  font-weight: 800;
}
.legacy-input {
  height: 58px;
  border: 1px solid #d8d8d8;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,.07);
  padding: 0 18px;
  display: flex;
  align-items: center;
  color: #777;
  font-size: 21px;
  font-weight: 500;
  background: #fff;
}
.legacy-links {
  display: grid;
  justify-items: center;
  gap: 20px;
  font-size: 19px;
  color: #5d5d5d;
}
.legacy-links span {
  text-decoration: underline;
  text-underline-offset: 3px;
}
.legacy-shell {
  width: 1200px;
  height: 940px;
  display: grid;
  grid-template-columns: 272px 1fr;
  overflow: hidden;
  border: 1px solid #cbc5bb;
  border-radius: 18px;
  background: #f7f4ee;
  box-shadow: 0 20px 54px rgba(35,31,27,.22);
}
.legacy-sidebar {
  display: flex;
  flex-direction: column;
  background: #eee7dd;
  border-right: 1px solid #ddd4c8;
}
.legacy-side-top {
  height: 58px;
  display: grid;
  grid-template-columns: 86px 1fr;
  align-items: center;
  gap: 10px;
  padding: 0 14px;
}
.legacy-traffic {
  display: flex;
  gap: 8px;
}
.legacy-traffic span {
  width: 13px;
  height: 13px;
  border-radius: 50%;
  background: #ff5f57;
}
.legacy-traffic span:nth-child(2) { background: #febc2e; }
.legacy-traffic span:nth-child(3) { background: #28c840; }
.legacy-mode {
  justify-self: end;
  display: flex;
  gap: 2px;
  border-radius: 12px;
  background: #ebe7df;
  padding: 3px;
  font-size: 13px;
  font-weight: 800;
}
.legacy-mode span {
  padding: 7px 12px;
  border-radius: 9px;
  color: #62615f;
}
.legacy-mode .active {
  background: #fff;
  color: #191919;
  box-shadow: 0 1px 5px rgba(0,0,0,.12);
}
.legacy-search {
  height: 44px;
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 0 8px 18px;
  border-radius: 11px;
  background: #fff;
  color: #6e6a65;
  padding: 0 14px;
  font-size: 15px;
}
.legacy-label {
  margin: 0 16px 8px;
  color: #6b6259;
  font-size: 12px;
  font-weight: 900;
  letter-spacing: .04em;
}
.legacy-conv {
  min-height: 46px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin: 0 8px;
  padding: 0 16px;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 750;
}
.legacy-conv.active { background: #e4d1bf; }
.legacy-footer {
  margin-top: auto;
  border-top: 1px solid #ddd4c8;
  padding: 14px 16px 18px;
  display: grid;
  gap: 14px;
  font-size: 15px;
  font-weight: 750;
  color: #4c4742;
}
.legacy-footer div {
  display: flex;
  align-items: center;
  gap: 10px;
}
.legacy-main {
  position: relative;
  display: grid;
  grid-template-rows: 58px 1fr auto;
  background: #f7f4ee;
}
.legacy-main header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 18px;
  font-size: 16px;
}
.legacy-hero {
  text-align: center;
  align-self: center;
  justify-self: center;
  transform: translateY(28px);
}
.legacy-spark {
  width: 52px;
  height: 52px;
  display: grid;
  place-items: center;
  margin: 0 auto 30px;
  border-radius: 17px;
  background: #ead9ca;
  color: #9b5c2e;
  box-shadow: 0 10px 28px rgba(130,87,49,.17);
  font-size: 24px;
}
.legacy-hero h5 {
  margin: 0 0 16px;
  font-size: 24px;
  line-height: 1.12;
  font-weight: 900;
}
.legacy-hero p {
  margin: 0;
  color: #57524d;
  font-size: 15px;
  line-height: 1.45;
}
.legacy-composer {
  margin: 0 20px 22px;
  min-height: 86px;
  border: 1px solid #ddd4c8;
  border-radius: 22px;
  background: #fff;
  box-shadow: 0 10px 28px rgba(60,46,33,.08);
  padding: 18px 14px 12px 16px;
  color: #8d867f;
}
.welcome-panel {
  width: 500px;
  margin: 132px auto 0;
  padding: 28px;
  border: 1px solid #d5dfe8;
  border-radius: 14px;
  background: #fff;
  box-shadow: 0 22px 60px rgba(0,0,0,.18);
}
.welcome-panel h5 {
  margin: 0 0 10px;
  font-size: 28px;
}
.welcome-panel p {
  margin: 0 0 18px;
  color: #5c5c5c;
  font-size: 15px;
  line-height: 1.45;
}
.caption {
  margin: 9px 2px 0;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.35;
}
.app {
  position: relative;
  width: 1040px;
  height: 720px;
  transform: scale(.54);
  transform-origin: 0 0;
  overflow: hidden;
  border: 1px solid var(--shell-line);
  background: var(--shell);
}
.traffic {
  position: absolute;
  z-index: 3;
  top: 16px;
  left: 18px;
  display: flex;
  gap: 8px;
}
.traffic i {
  width: 11px;
  height: 11px;
  border-radius: 50%;
  background: #ff5f57;
}
.traffic i:nth-child(2) { background: #ffbd2e; }
.traffic i:nth-child(3) { background: #28c840; }
.sidebar {
  position: absolute;
  inset: 0 auto 0 0;
  width: 230px;
  padding: 48px 14px 14px;
  border-right: 1px solid var(--shell-line);
  background: var(--sidebar);
}
.mode {
  display: flex;
  gap: 4px;
  padding: 4px;
  border-radius: 12px;
  background: #fff;
}
.mode span {
  flex: 1;
  padding: 8px 0;
  border-radius: 8px;
  text-align: center;
  font-size: 13px;
  font-weight: 800;
}
.mode .active {
  background: #f7f4ef;
  box-shadow: 0 1px 6px rgba(20, 30, 40, .16);
}
.search,
.side-row,
.workspace-row {
  margin-top: 12px;
  padding: 10px 11px;
  border: 1px solid #e0d8cd;
  border-radius: 8px;
  background: #fff;
  font-size: 13px;
}
.side-label {
  margin: 20px 4px 8px;
  color: #6f655a;
  font-size: 12px;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: .06em;
}
.side-footer {
  position: absolute;
  left: 14px;
  right: 14px;
  bottom: 14px;
  display: grid;
  gap: 8px;
}
.footer-row {
  display: flex;
  justify-content: space-between;
  gap: 8px;
  align-items: center;
  padding: 10px 11px;
  border: 1px solid #e0d8cd;
  border-radius: 8px;
  background: #fff;
  font-size: 13px;
}
.account-user {
  display: grid;
  gap: 4px;
}
.account-user strong { font-size: 13px; }
.account-user small { color: #6f655a; font-size: 11px; }
.role {
  border-radius: 999px;
  padding: 4px 7px;
  background: var(--green-soft);
  color: var(--green);
  font-size: 10px;
  font-weight: 900;
}
.main {
  position: absolute;
  inset: 0 0 0 230px;
  background: #fffdf9;
}
.bar {
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 22px;
  border-bottom: 1px solid #ebe4dc;
  background: #fffaf3;
}
.bar strong { font-size: 15px; }
.bar-actions {
  display: flex;
  gap: 8px;
}
.small-button,
.primary,
.danger-button {
  border: 1px solid #d5c9bb;
  border-radius: 8px;
  padding: 8px 12px;
  background: #fff;
  font-size: 12px;
  font-weight: 900;
}
.primary {
  border-color: #2d77b8;
  background: #2d77b8;
  color: #fff;
}
.danger-button {
  border-color: #d7a1a1;
  background: var(--red-soft);
  color: var(--red);
}
.chat-body,
.author-body {
  position: absolute;
  inset: 56px 0 0;
  padding: 36px 42px 96px;
}
.empty-hero {
  max-width: 520px;
  margin: 78px auto 0;
  text-align: center;
}
.empty-hero h4,
.login-card h4,
.publish-modal h4,
.browser-card h4 {
  margin: 0 0 8px;
  font-size: 24px;
}
.empty-hero p,
.login-card p,
.publish-modal p,
.browser-card p {
  margin: 0;
  color: #667789;
  font-size: 14px;
  line-height: 1.45;
}
.composer {
  position: absolute;
  left: 36px;
  right: 36px;
  bottom: 26px;
  min-height: 64px;
  padding: 15px 18px;
  border: 1px solid #e2d8cc;
  border-radius: 22px;
  color: #948878;
  background: #fff;
}
.login-page {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  background: #fbfaf7;
}
.login-card {
  width: 385px;
  padding: 28px;
  border: 1px solid #d8dfe7;
  border-radius: 12px;
  background: #fff;
  box-shadow: 0 18px 44px rgba(31, 41, 55, .14);
  text-align: center;
}
.login-card .field {
  height: 42px;
  margin-top: 10px;
  display: flex;
  align-items: center;
  padding: 0 12px;
  border: 1px solid #cfd8e3;
  border-radius: 6px;
  color: #7a8795;
  background: #fff;
  text-align: left;
  font-size: 13px;
}
.login-card .links {
  display: flex;
  justify-content: space-between;
  margin-top: 12px;
  color: #2d77b8;
  font-size: 12px;
  font-weight: 800;
}
.inline-error {
  margin-top: 10px;
  padding: 9px 10px;
  border: 1px solid #f0b4b4;
  border-radius: 7px;
  background: var(--red-soft);
  color: var(--red);
  text-align: left;
  font-size: 12px;
  font-weight: 800;
}
.browser-card {
  width: 520px;
  margin: 120px auto 0;
  padding: 22px;
  border: 1px solid #d8dfe7;
  border-radius: 12px;
  background: #fff;
  box-shadow: 0 18px 40px rgba(31, 41, 55, .16);
}
.browser-top {
  height: 34px;
  margin: -4px -4px 18px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 12px;
  border-radius: 8px;
  background: #f0f4f8;
  color: #667789;
  font-size: 12px;
}
.progress-line {
  height: 8px;
  margin-top: 18px;
  overflow: hidden;
  border-radius: 999px;
  background: #e4ebf2;
}
.progress-line span {
  display: block;
  width: 58%;
  height: 100%;
  background: #2d77b8;
}
.author-body {
  display: grid;
  grid-template-columns: 170px 1fr;
  padding: 0;
}
.author-nav {
  padding: 22px 16px;
  border-right: 1px solid #ebe4dc;
  background: #f5efe8;
}
.author-nav div {
  margin: 5px 0;
  padding: 8px 10px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 800;
}
.author-nav .active { background: #fff; border: 1px solid #e4ddd4; }
.author-main {
  position: relative;
  padding: 24px;
}
.editor-box {
  height: 330px;
  border: 1px solid #ddd6cc;
  border-radius: 9px;
  background: #fff;
  padding: 18px;
}
.publish-modal {
  width: 460px;
  margin: 64px auto 0;
  padding: 20px;
  border: 1px solid #d5dfe8;
  border-radius: 12px;
  background: #fff;
  box-shadow: 0 18px 46px rgba(31, 41, 55, .22);
}
.publish-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  align-items: center;
  margin-top: 12px;
  padding: 12px;
  border: 1px solid #e0e7ef;
  border-radius: 9px;
  background: #f8fafc;
  font-size: 13px;
}
.toast {
  position: absolute;
  right: 24px;
  bottom: 24px;
  max-width: 330px;
  padding: 12px 14px;
  border: 1px solid #d9e2ea;
  border-radius: 10px;
  background: #fff;
  box-shadow: 0 12px 34px rgba(31, 41, 55, .18);
  font-size: 13px;
}
.toast.error {
  border-color: #edb7b7;
  background: var(--red-soft);
  color: var(--red);
}
.toast.success {
  border-color: #b8e2c6;
  background: var(--green-soft);
  color: var(--green);
}
.card-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 18px;

<script>
const states = {

  "1.1": {title:"1.1 Sidebar Login Entry", tags:["Branch","Sidebar"], tone:"", caption:"The user clicks Log in in the account footer. The footer stays signed out until authentication succeeds.", screen:"sidebar-login"},
  "1.2": {title:"1.2 Publish Action Starts While Signed Out", tags:["Branch","Publish"], tone:"waiting", caption:"Publish opens from authoring and checks sign-in before package upload or catalog submission.", screen:"publish-check"},
  "1.2.1": {title:"1.2.1 Publish Sign-In Gate", tags:["Gate","Blocked"], tone:"waiting", caption:"The publish dialog says Sign in to NoraClaw to publish. No package upload starts until sign-in succeeds.", screen:"publish-gate"},
  "1.3": {title:"1.3 Signed-Out Footer And Local-Only App Behavior", tags:["Detail","Signed out"], tone:"", caption:"The user can continue local work while account-required entries still resolve to a sign-in gate.", screen:"local-only"},
  "1.4": {title:"1.4 Publish Gate Closed Or Deferred", tags:["Recovery","Deferred"], tone:"waiting", caption:"Closing the sign-in gate returns to the authoring context without starting upload or storing account state.", screen:"publish-closed"},
  "2": {title:"2 Browser Login", tags:["Main path","Auth"], tone:"waiting", caption:"The browser login surface opens from the sidebar or publish gate and preserves the original return context.", screen:"login"},
  "2.1": {title:"2.1 Account Login Page", tags:["Branch","Login page"], tone:"", caption:"Login page shows Log in to NoraClaw, Continue with Google, email/password, Forgot your password?, and Create account.", screen:"login"},
  "2.1.1": {title:"2.1.1 Google Sign-In Choice", tags:["Google"], tone:"waiting", caption:"Continue with Google opens a browser or auth handoff while the desktop app waits for a result.", screen:"google"},
  "2.1.2": {title:"2.1.2 Email/Password Sign-In Choice", tags:["Email"], tone:"waiting", caption:"Email and password fields remain visible; submit is meaningful only after required fields are present.", screen:"email"},
  "2.1.2.1": {title:"2.1.2.1 Email/Password Validation Failure", tags:["Error","Retry"], tone:"error", caption:"Invalid credentials show inline error, keep the email available, and let the user retry.", screen:"email-error"},
  "2.1.3": {title:"2.1.3 Create Account Entry", tags:["Create account"], tone:"waiting", caption:"Account creation opens from the account surface and can return to normal login if abandoned.", screen:"create-account"},
  "2.1.4": {title:"2.1.4 Forgot Password Entry", tags:["Recovery"], tone:"waiting", caption:"Password recovery opens from the account route and returns the user to normal login.", screen:"forgot-password"},

  "2.2.2": {title:"2.2.2 Authentication Canceled", tags:["Canceled","Signed out"], tone:"error", caption:"The user cancels authentication and returns to the original signed-out surface or publish sign-in gate.", screen:"auth-canceled"},
  "2.2.3": {title:"2.2.3 Authentication Failed", tags:["Error","Retry"], tone:"error", caption:"A failure message appears near the active login or gated surface, and retry remains available.", screen:"auth-failed"},
  "2.3": {title:"2.3 Authentication Retry Recovery", tags:["Recovery"], tone:"error", caption:"Retry, change method, or cancel stays tied to the original sidebar or publish origin.", screen:"retry-recovery"},
  "3": {title:"3 Signed-In App", tags:["Main path","Signed in"], tone:"success", caption:"Sidebar footer shows identity, role badge, and Sign out. Account-required dialogs can continue.", screen:"signed-in"},
  "3.1": {title:"3.1 Sidebar Signed-In Identity", tags:["Branch","Signed in"], tone:"success", caption:"The sidebar shows the signed-in user, developer role badge, and Sign out action.", screen:"signed-in"},
  "3.2": {title:"3.2 Account-Required Publish Action Continues", tags:["Publish","Signed in"], tone:"success", caption:"The publish dialog moves beyond the sign-in gate into package, metadata, upload, success, or publish error states.", screen:"publish-continue"},
  "3.3": {title:"3.3 User Signs Out", tags:["Sign out"], tone:"waiting", caption:"Clicking Sign out clears local account state while leaving the current app surface visible.", screen:"sign-out"},
  "3.3.1": {title:"3.3.1 Signed-Out State After Sign-Out", tags:["Signed out"], tone:"", caption:"The footer returns to Log in and account-required actions become gated again.", screen:"signed-out-after"},
  "3.4": {title:"3.4 Current Account Session Cannot Be Used", tags:["Error","Session"], tone:"error", caption:"The publish dialog shows a sign-in-again error instead of continuing upload or submission.", screen:"session-error"},
  "3.4.1": {title:"3.4.1 Re-Login From An Account-Required Error", tags:["Recovery","Re-login"], tone:"waiting", caption:"The same login route opens while the publish dialog remains the recovery context.", screen:"relogin"},
  "3.5": {title:"3.5 Signed-In Local-Only Continuation", tags:["Detail","Signed in"], tone:"success", caption:"The user can keep using Chat, Code, Settings, or authoring while signed-in state remains available.", screen:"signed-in-local"},
  "3.6": {title:"3.6 Sign-Out And Session Recovery Summary", tags:["Recovery"], tone:"error", caption:"Recovery can refresh the account, clear it, or keep account-required work blocked while local work remains visible.", screen:"session-recovery"}
};

const routes = [
  {name:"Sidebar Google login", ids:["1","1.1","2","2.1","2.1.1","2.2","2.2.1","3","3.1"], result:"The user signs in from the sidebar with Google and sees signed-in account footer state."},
  {name:"Sidebar email login", ids:["1","1.1","2","2.1","2.1.2","2.2","2.2.1","3","3.1"], result:"The user signs in from the sidebar with email/password and sees signed-in account footer state."},
  {name:"Email validation retry", ids:["1","1.1","2","2.1","2.1.2","2.1.2.1","2.1","2.1.2","2.2","2.2.1","3","3.1"], result:"The login page keeps the user in context after invalid credentials, then succeeds after retry."},
  {name:"Create account from login", ids:["1","1.1","2","2.1","2.1.3","2.2","2.2.1","3","3.1"], result:"The user enters account creation from the login page and returns signed in after completion."},
  {name:"Forgot password return", ids:["1","1.1","2","2.1","2.1.4","2.1"], result:"The user uses password recovery and returns to the account login page."},
  {name:"Sidebar authentication canceled", ids:["1","1.1","2","2.1","2.1.1","2.2","2.2.2","2.3","1"], result:"The user cancels authentication and remains signed out with local app surfaces available."},
  {name:"Sidebar authentication failed then retried", ids:["1","1.1","2","2.1","2.1.1","2.2","2.2.3","2.3","2.1","2.1.2","2.2","2.2.1","3","3.1"], result:"The failed sign-in keeps the user in account recovery, then a later attempt succeeds."},
  {name:"Publish blocked while signed out", ids:["1","1.2","1.2.1"], result:"The publish/review action stops before package upload and asks the user to sign in."},
  {name:"Publish sign-in happy path", ids:["1","1.2","1.2.1","2","2.1","2.1.1","2.2","2.2.1","3","3.2"], result:"The user signs in from the publish gate and the publish dialog proceeds into signed-in publishing states."},
  {name:"Publish gate closed", ids:["1","1.2","1.2.1","1.4","1"], result:"The user defers sign-in; no package upload starts and the app returns to the local context."},
  {name:"Already signed-in publish", ids:["3","3.1","3.2"], result:"The user opens publish while signed in and skips the sign-in gate."},
  {name:"Publish session unusable with re-login", ids:["3","3.1","3.2","3.4","3.4.1","2","2.1","2.1.2","2.2","2.2.1","3","3.2"], result:"A session problem blocks the account-required action, then re-login returns the user to the publish flow."},
  {name:"Sign out", ids:["3","3.1","3.3","3.3.1","1"], result:"Account state is cleared, the sidebar returns to Log in, and account-required actions become gated again."},
  {name:"Sign out then hit publish gate", ids:["3","3.1","3.3","3.3.1","1","1.2","1.2.1"], result:"After sign-out, publishing again opens the unauthenticated sign-in gate."}
];

const branchIds = ["1.1","1.2","2.1","2.1.1","2.1.2","2.1.3","2.1.4","2.2","2.2.1","3.1","3.2","3.3","3.3.1"];
const detailIds = ["1.3","3.5"];
const stateLanguageIds = ["0.1","0.2","0.3","0.4"];
const errorRecoveryIds = ["1.2.1","1.4","2.1.2.1","2.2.2","2.2.3","2.3","3.4","3.4.1","3.6"];

function esc(value) {
  return String(value).replace(/[&<>"']/g, ch => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#39;"
  }[ch]));
}

function tagClass(tag, tone) {
  if (tone === "error" || tag === "Error" || tag === "Blocked") return "badge red";
  if (tone === "success" || tag === "Success" || tag === "Signed in") return "badge green";
  if (tone === "waiting" || tag === "Waiting" || tag === "Recovery" || tag === "Deferred") return "badge amber";
  return "badge";
}

function card(id) {
  const state = states[id];
  const tone = state.tone ? ` ${state.tone}` : "";
  const badges = state.tags.map(tag => `<span class="${tagClass(tag, state.tone)}">${esc(tag)}</span>`).join("");
  return `<article class="card${tone}" data-state-id="${esc(id)}">
    <div class="card-head">
      <h3>${esc(state.title)}</h3>
      <div class="badges"><span class="badge">${esc(id)}</span>${badges}</div>
    </div>
    <div class="screen">${renderScreen(state.screen)}</div>
    <p class="caption">${esc(state.caption)}</p>
  </article>`;
}

function appFrame(mainHtml, options = {}) {
  const signedIn = options.signedIn;
  const accountLabel = signedIn ? `<div class="account-user"><strong>zhaowei@example.com</strong><small>Signed in</small></div><span class="role">developer</span>` : `<strong>Log in</strong>`;
  const activeMode = options.mode || "Chat";
  return `<div class="app">
    <div class="traffic"><i></i><i></i><i></i></div>
    <aside class="sidebar">
      <div class="mode"><span class="${activeMode === "Chat" ? "active" : ""}">Chat</span><span class="${activeMode === "Code" ? "active" : ""}">Code</span></div>
      <div class="search">Search conversations...</div>
      <div class="side-label">${activeMode === "Code" ? "Workspaces" : "Conversations"}</div>
      <div class="side-row ${activeMode === "Chat" ? "active" : ""}">${activeMode === "Chat" ? "New conversation" : "hardware-agent"}</div>
      <div class="side-row">${activeMode === "Chat" ? "Hardware planning" : "Catalog package"}</div>
      <div class="side-row">${activeMode === "Chat" ? "Device notes" : "Release notes"}</div>
      <div class="side-footer">
        <div class="footer-row"><span>Settings</span><span>General</span></div>
        <div class="footer-row">${accountLabel}</div>
        ${signedIn ? `<div class="footer-row"><span>Account</span><strong>Sign out</strong></div>` : ""}
      </div>
    </aside>
    <section class="main">${mainHtml}</section>
  </div>`;
}

function chatMain(message) {
  return `<div class="bar"><strong>NoraHarness</strong><div class="bar-actions"><button class="small-button">MiniMax-M2.5</button><button class="small-button">medium</button></div></div>
  <div class="chat-body">
    <div class="empty-hero"><h4>${esc(message.title)}</h4><p>${esc(message.body)}</p></div>
    <div class="composer">Ask NoraHarness anything... <button class="small-button">Send</button></div>
  </div>`;
}

function authorMain(modal) {
  return `<div class="bar"><strong>Agent Authoring</strong><div class="bar-actions"><button class="small-button">Preview on Mobile</button><button class="primary">Publish</button></div></div>
  <div class="author-body">
    <nav class="author-nav"><div class="active">Soul</div><div>Style</div><div>Tools</div><div>Skills</div><div>Capabilities</div></nav>
    <section class="author-main"><div class="editor-box"><strong>Agent package</strong><p>Editable agent files stay behind the publish dialog.</p></div>${modal}</section>
  </div>`;
}

function publishModal(kind) {
  if (kind === "checking") {
    return `<div class="publish-modal"><h4>Publish to Catalog</h4><p>Checking sign-in before package upload.</p><div class="publish-row"><strong>Account</strong><span class="badge amber">Checking</span></div><div class="publish-row"><span>Package upload</span><span>Waiting</span></div></div>`;
  }
  if (kind === "gate") {
    return `<div class="publish-modal"><h4>Sign in to NoraClaw to publish.</h4><p>This publish action is held until account authentication succeeds.</p><div class="publish-row"><strong>Account required</strong><button class="primary">Sign in</button></div></div>`;
  }
  if (kind === "closed") {
    return `<div class="publish-modal"><h4>Publish not started</h4><p>The sign-in gate was closed. No package upload or catalog submission has started.</p><div class="publish-row"><span>Account</span><span>Signed out</span></div></div>`;
  }
  if (kind === "continue") {
    return `<div class="publish-modal"><h4>Publish to Catalog</h4><p>Signed in as zhaowei@example.com.</p><div class="publish-row"><strong>Package digest</strong><span class="badge green">Ready</span></div><div class="publish-row"><strong>Mode</strong><span>New version</span></div><div class="publish-row"><strong>Upload</strong><button class="primary">Publish</button></div></div>`;
  }
  if (kind === "session-error") {
    return `<div class="publish-modal"><h4>Sign in again to publish.</h4><p>The current account session cannot be used for this account-required action.</p><div class="publish-row"><strong>Publish blocked</strong><button class="primary">Sign in again</button></div><div class="publish-row"><span>Package upload</span><span>Not started</span></div></div>`;
  }
  return "";
}

function loginPage(kind) {
  let body = `<h4>Log in to NoraClaw</h4><p>Use your NoraClaw account to continue.</p>
    <button class="primary" style="width:100%;margin-top:18px">Continue with Google</button>
    <div class="field">Email</div>
    <div class="field">Password</div>
    <button class="small-button" style="width:100%;margin-top:10px">Continue with Email</button>
    <div class="links"><span>Forgot your password?</span><span>Create account</span></div>`;
  if (kind === "email") {
    body = `<h4>Log in to NoraClaw</h4><p>Email sign-in keeps the user on the account page.</p>
      <div class="field">zhaowei@example.com</div><div class="field">Password hidden</div>
      <button class="primary" style="width:100%;margin-top:12px">Continue with Email</button>
      <div class="links"><span>Forgot your password?</span><span>Continue with Google</span></div>`;
  }
  if (kind === "email-error") {
    body = `<h4>Log in to NoraClaw</h4><p>Email can be corrected and retried.</p>
      <div class="field">zhaowei@example.com</div><div class="field">Password hidden</div>
      <div class="inline-error">Email or password was not accepted.</div>
      <button class="primary" style="width:100%;margin-top:12px">Continue with Email</button>
      <div class="links"><span>Forgot your password?</span><span>Continue with Google</span></div>`;
  }
  if (kind === "create") {
    body = `<h4>Create account</h4><p>Create a NoraClaw account, then return signed in.</p>
      <div class="field">Email</div><div class="field">Password</div>
      <button class="primary" style="width:100%;margin-top:12px">Create account</button>
      <div class="links"><span>Already have an account?</span><span>Log in</span></div>`;
  }
  if (kind === "forgot") {
    body = `<h4>Reset password</h4><p>Request recovery, then return to login.</p>
      <div class="field">Email</div>
      <button class="primary" style="width:100%;margin-top:12px">Send recovery link</button>
      <div class="links"><span>Back to login</span><span></span></div>`;
  }
  return `<div class="login-page"><div class="login-card">${body}</div></div>`;
}

function renderScreen(type) {
  switch (type) {
    case "signed-out":
    case "sidebar-login":
      return appFrame(chatMain({title:"Ready to work locally", body:"The account footer is signed out. Account-required actions will ask for sign-in."}));
    case "local-only":
      return appFrame(chatMain({title:"Local work continues", body:"Chat, Code, and Settings remain available while the footer still shows Log in."}));
    case "login":
      return appFrame(loginPage("login"));
    case "google":
      return appFrame(`<div class="bar"><strong>Browser authentication</strong><span class="badge amber">Waiting</span></div><div class="browser-card"><div class="browser-top">accounts.noraclaw.com / oauth / google</div><h4>Continue with Google</h4><p>The browser or auth surface is open. NoraHarness waits for the result.</p><div class="progress-line"><span></span></div><button class="small-button" style="margin-top:18px">Cancel</button></div>`);
    case "email":
      return appFrame(loginPage("email"));
    case "email-error":
      return appFrame(loginPage("email-error"));
    case "create-account":
      return appFrame(loginPage("create"));
    case "forgot-password":
      return appFrame(loginPage("forgot"));
    case "waiting":
      return appFrame(`<div class="bar"><strong>Authentication pending</strong><span class="badge amber">Waiting</span></div><div class="browser-card"><h4>Waiting for account result</h4><p>The originating app context is preserved until success, cancellation, or failure.</p><div class="progress-line"><span></span></div></div>`);
    case "auth-success":
      return appFrame(chatMain({title:"Returned signed in", body:"The app returns to the origin and updates account state."}), {signedIn:true});
    case "auth-canceled":
      return appFrame(chatMain({title:"Sign-in canceled", body:"The user remains signed out and can retry or keep working locally."}) + `<div class="toast error"><strong>Sign-in did not complete.</strong><br>Try again when ready.</div>`);
    case "auth-failed":
      return appFrame(loginPage("login") + `<div class="toast error"><strong>Sign-in failed.</strong><br>Retry or choose another method.</div>`);
    case "retry-recovery":
      return appFrame(loginPage("login") + `<div class="toast error"><strong>Still signed out.</strong><br>Retry sign-in, change method, or return to the app.</div>`);
    case "signed-in":
      return appFrame(chatMain({title:"Signed-in account visible", body:"The account footer shows identity, developer role, and Sign out."}), {signedIn:true});
    case "footer-language":
      return appFrame(chatMain({title:"Footer state language", body:"Signed out uses Log in. Signed in uses identity, role badge, and Sign out."}), {signedIn:true});
    case "signed-in-local":
      return appFrame(chatMain({title:"Local work continues signed in", body:"The signed-in footer remains available while Chat or Code work continues."}), {signedIn:true});
    case "publish-check":
      return appFrame(authorMain(publishModal("checking")), {mode:"Code"});
    case "publish-gate":
      return appFrame(authorMain(publishModal("gate")), {mode:"Code"});
    case "publish-closed":
      return appFrame(authorMain(publishModal("closed")), {mode:"Code"});
    case "publish-continue":
      return appFrame(authorMain(publishModal("continue")), {mode:"Code", signedIn:true});
    case "sign-out":
      return appFrame(chatMain({title:"Sign out selected", body:"The signed-in account action clears account state and keeps the app surface visible."}), {signedIn:true});
    case "signed-out-after":
      return appFrame(chatMain({title:"Signed out after account action", body:"The footer returns to Log in. Publishing will show the sign-in gate again."}));
    case "session-error":
      return appFrame(authorMain(publishModal("session-error")), {mode:"Code", signedIn:true});
    case "relogin":
      return appFrame(authorMain(publishModal("session-error")) + `<div class="toast"><strong>Re-login starts.</strong><br>The publish dialog remains the recovery context.</div>`, {mode:"Code"});
    case "session-recovery":
      return appFrame(authorMain(publishModal("session-error")) + `<div class="toast error"><strong>Account recovery needed.</strong><br>Sign in again, cancel, or continue local work.</div>`, {mode:"Code", signedIn:true});
    default:
      return appFrame(chatMain({title:"Account state", body:"This state follows the current Journey 3 record."}));
  }
}

function routeRow(route, index, rowId, labelPrefix = "") {

    <div class="route-title"><h2>${esc(labelPrefix)}${esc(route.name)}</h2><p>${esc(route.result)}</p></div>
    <div class="route-flow">${cards}</div>
  </section>`;
}

function legacyHappyCard(title, description, html, tone = "main") {
  return `<article class="card ${tone}">
    <div class="card-head"><h3>${esc(title)}</h3><div class="badges"><span class="badge">Main happy path</span></div></div>
    <div class="screen legacy-screen">${html}</div>
    <p class="caption">${esc(description)}</p>
  </article>`;
}

function legacyMainPathBand() {
  const cards = [
    legacyHappyCard("Signed-out entry", "User starts in the app shell with local context visible and a Log in footer action.", legacyShell(false), ""),
    legacyHappyCard("Browser login", "The account surface opens as the standalone NoraClaw login page, matching the old Journey 3 baseline.", legacyLogin(), "waiting"),
    legacyHappyCard("Welcome back", "Authentication returns through the browser/account handoff without restarting onboarding.", legacyWelcomeBack(), "success"),
    legacyHappyCard("Signed-in app", "The app restores the originating context and shows signed-in account state in the sidebar.", legacyShell(true), "success")
  ];
  return `<div class="route-flow">${cards.map((html, i) => `${i ? '<div class="arrow" aria-hidden="true">&rarr;</div>' : ""}${html}`).join("")}</div>`;
}

function band(id, title, summary, content) {
  return `<section class="band" id="${esc(id)}">
    <div class="band-title"><h2>${esc(title)}</h2><p>${esc(summary)}</p></div>
    ${content}
  </section>`;
}

function cardGrid(ids) {
  if (!ids.length) {
    return `<div class="card-grid"><article class="card"><div class="card-head"><h3>No separate states</h3><div class="badges"><span class="badge">Empty</span></div></div><div class="screen">${renderScreen("signed-out")}</div><p class="caption">This record has no separate states for this category.</p></article></div>`;
  }
  return `<div class="card-grid">${ids.map(id => card(id)).join("")}</div>`;
}

function summaryItem(kind, id, title, body) {
  const badgeClass = kind === "error" ? "badge red" : kind === "success" ? "badge green" : kind === "warn" ? "badge amber" : "badge";
  return `<div class="route-item"><strong><span class="${badgeClass}">${esc(id)}</span> ${esc(title)}</strong><p>${esc(body)}</p></div>`;
}

function copyItem(label, body) {
  return `<div class="copy-row"><strong>${esc(label)}</strong><span>${esc(body)}</span></div>`;
}

function summaryCard(id, tone, body, panelHtml) {
  const state = states[id];
  const toneClass = tone ? ` ${tone}` : "";
  return `<article class="card${toneClass}" data-state-id="${esc(id)}">
    <div class="card-head">
      <h3>${esc(state.title)}</h3>
      <div class="badges"><span class="badge">${esc(id)}</span>${state.tags.map(tag => `<span class="${tagClass(tag, state.tone)}">${esc(tag)}</span>`).join("")}</div>
    </div>
    <p class="caption">${esc(body)}</p>
    <div class="state-panel">${panelHtml}</div>
  </article>`;
}

function detailStatesBand() {
  const cards = [
    summaryCard("1.3", "", "Signed-out app use remains available while account-required entries keep routing to sign-in.", `<div class="route-list">
      ${summaryItem("info", "1", "Signed-out footer", "The shared sidebar footer shows Log in and does not show identity or Sign out.")}
      ${summaryItem("info", "1.1", "Sidebar login entry", "Clicking Log in opens the account route without changing local Chat or Code context.")}
      ${summaryItem("warn", "1.2", "Account-required work", "Publish or review actions still stop at the sign-in gate until an account returns.")}
    </div>`),
    summaryCard("3.5", "success", "Signed-in local work remains normal; account state is available but does not replace the current app surface.", `<div class="route-list">
      ${summaryItem("success", "3.1", "Signed-in footer", "The sidebar keeps identity, role badge, and Sign out visible.")}
      ${summaryItem("success", "3.2", "Later account-required work", "Publish can continue when opened while the session remains usable.")}
      ${summaryItem("warn", "3.3", "Sign-out remains available", "The user can clear account state without losing local app context.")}
    </div>`)
  ];
  return `<div class="route-flow">${cards.map((html, i) => `${i ? '<div class="arrow" aria-hidden="true">&rarr;</div>' : ""}${html}`).join("")}</div>`;
}

      ${copyItem("Log in", "Signed-out footer action.")}
      ${copyItem("Identity and developer role", "Signed-in footer state.")}
      ${copyItem("Sign out", "Account-clearing action available after sign-in.")}
    </div>`),
    summaryCard("0.2", "", "Login page copy stays on the account surface and keeps all sign-in alternatives visible.", `<div class="copy-list">
      ${copyItem("Log in to NoraClaw", "Account page title.")}
      ${copyItem("Continue with Google", "Browser/auth handoff action.")}
      ${copyItem("Continue with Email", "Email/password submission action.")}
      ${copyItem("Forgot your password? / Create account", "Secondary account routes.")}
    </div>`),
    summaryCard("0.3", "waiting", "Publish gate language separates account requirements from package upload or catalog submission.", `<div class="copy-list">
      ${copyItem("Sign in to NoraClaw to publish.", "Signed-out publish gate title.")}
      ${copyItem("Sign in", "Primary gate action.")}
      ${copyItem("Signed in as ...", "Signed-in publish context once a usable account exists.")}

    summaryCard("0.4", "error", "Recovery copy stays near the active login, sidebar, or publish context.", `<div class="copy-list">

function errorsBand() {
  const cards = [
    summaryCard("1.2.1", "waiting", "Publish is blocked before upload when no signed-in account is available.", `<div class="route-list">
      ${summaryItem("warn", "gate", "Sign-in required", "The dialog asks the user to sign in before publish can proceed.")}
      ${summaryItem("info", "next", "Recovery choices", "Sign in moves to Browser Login; close moves to gate deferred.")}
    </div>`),
    summaryCard("1.4", "waiting", "Closing the publish sign-in gate returns to the app without starting upload.", `<div class="route-list">
      ${summaryItem("warn", "closed", "Publish not started", "No account session is stored and no package upload is attempted.")}
      ${summaryItem("info", "origin", "Return to local context", "The sidebar remains signed out and local work is still available.")}
    </div>`),
    summaryCard("2.1.2.1", "error", "Email/password validation failure is recoverable on the login page.", `<div class="route-list">
      ${summaryItem("error", "invalid", "Credentials rejected", "The email remains available and password stays hidden.")}
      ${summaryItem("info", "retry", "Retry in place", "The user can correct fields, switch method, or use password recovery.")}
    </div>`),
    summaryCard("2.2.2", "error", "Authentication can be canceled without changing account state.", `<div class="route-list">
      ${summaryItem("error", "canceled", "No account returned", "The sidebar or publish origin remains signed out.")}
      ${summaryItem("info", "origin", "Return path preserved", "The user can retry sign-in or continue local-only work.")}
    </div>`),
    summaryCard("2.2.3", "error", "Authentication failure keeps the user near the active account route.", `<div class="route-list">
      ${summaryItem("error", "failed", "Sign-in did not complete", "No signed-in account is stored.")}
      ${summaryItem("info", "retry", "Choose another method", "Retry can return to the login page or the publish sign-in gate.")}
    </div>`),
    summaryCard("2.3", "error", "Retry recovery is the shared path after canceled or failed authentication.", `<div class="route-list">
      ${summaryItem("info", "retry", "Retry sign-in", "Returns to Account Login Page.")}
      ${summaryItem("warn", "cancel", "Cancel back to origin", "Returns to Signed-Out Entry or Publish Sign-In Gate.")}
    </div>`),
    summaryCard("3.4", "error", "A stored account can become unusable for an account-required action.", `<div class="route-list">
      ${summaryItem("error", "session", "Publish blocked", "The publish dialog asks for sign-in again instead of continuing upload.")}
      ${summaryItem("info", "context", "Origin preserved", "The publish dialog remains the recovery context.")}
    </div>`),
    summaryCard("3.4.1", "waiting", "Re-login starts from the account-required error without losing publish context.", `<div class="route-list">
      ${summaryItem("warn", "re-login", "Fresh authentication", "The same login route opens again.")}
      ${summaryItem("success", "return", "Resume publish", "Success returns to account-required publish continuation.")}
    </div>`),
    summaryCard("3.6", "error", "Session recovery summarizes refresh, sign-out, cancel, and blocked states.", `<div class="route-list">
      ${summaryItem("success", "refresh", "Account refreshed", "Publish can continue after successful authentication.")}
      ${summaryItem("warn", "cleared", "Account cleared", "The footer returns to Log in and account-required work gates again.")}
      ${summaryItem("error", "blocked", "Still unavailable", "The user can continue local work while account-required work remains blocked.")}
    </div>`)
  ];
  return `<div class="route-flow">${cards.map((html, i) => `${i ? '<div class="arrow" aria-hidden="true">&rarr;</div>' : ""}${html}`).join("")}</div>`;
}

function routeMapBand() {
  return routes.map((route, index) => routeRow(route, index, `route-${index}`, index === 0 ? "Main happy path route: " : "")).join("");
}

function renderCanvas() {
  return [
    band("band-main", "Main happy path", "Old Journey 3 four-card app -> browser -> app baseline preserved without expanding the Route Table composition.", legacyMainPathBand()),
    band("band-route-map", "Route map", "Every Route Table row is represented as a complete full-size product wireframe row.", routeMapBand()),
    band("band-branch", "Branch journeys", "Full product screens for account paths that branch from the main journey.", cardGrid(branchIds)),
    band("band-detail", "Detail states", "Journey 1 style state cards for local-only account behavior and signed-in continuation.", detailStatesBand()),
    band("band-state-language", "State language", "Journey 1 style copy cards for account, login, publish-gate, and recovery language.", stateLanguageBand()),
    band("band-errors", "Errors and recovery", "Journey 1 style summary index for blocked, canceled, failed, retry, re-login, and recovery states.", errorsBand())
  ].join("");
}

function jumpEntry(href, label, note) {
  return `<a href="${esc(href)}">${esc(label)}<small>${esc(note)}</small></a>`;
}

function renderJump() {
  const firstLevel = [
    ["#band-main", "Main happy path", "Signed-out entry -> Browser login -> Welcome back -> Signed-in app"],
    ["#band-route-map", "Route map", "All 14 full route rows"],
    ["#band-branch", "Branch journeys", branchIds.join(" -> ")],
    ["#band-detail", "Detail states", detailIds.join(" -> ")],
    ["#band-state-language", "State language", stateLanguageIds.join(" -> ")],
    ["#band-errors", "Errors and recovery", errorRecoveryIds.join(" -> ")]
  ].map(([href, label, note]) => jumpEntry(href, label, note)).join("");
  const shortcuts = routes.map((route, i) => jumpEntry(`#route-${i}`, `Route: ${route.name}`, route.ids.join(" -> "))).join("");
  return `<h2>Jump List</h2>${firstLevel}<h2 style="margin-top:18px">Route Shortcuts</h2>${shortcuts}`;
}

function render() {
  const jump = document.getElementById("jump");
  jump.innerHTML = renderJump();
  document.getElementById("stage").innerHTML = renderCanvas();
}

render();

const viewport = document.getElementById("viewport");
const stage = document.getElementById("stage");
let scale = .7;
let x = 18;
let y = 18;
let dragging = false;
let sx = 0;
let sy = 0;
let px = 0;
let py = 0;
let raf = 0;

function applyTransform() {
  raf = 0;
  stage.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
}
function scheduleTransform() {
  if (!raf) raf = requestAnimationFrame(applyTransform);
}
function fitCanvas() {
  const rect = viewport.getBoundingClientRect();
  const contentWidth = Math.max(...routes.map(route => route.ids.length * 610)) + 120;
  const contentHeight = Math.max(stage.scrollHeight, 14200);
  scale = Math.max(.16, Math.min(.82, Math.min(rect.width / contentWidth, rect.height / contentHeight)));
  x = 18;
  y = 18;
  scheduleTransform();
}

viewport.addEventListener("pointerdown", event => {
  dragging = true;
  viewport.classList.add("dragging");
  sx = event.clientX;
  sy = event.clientY;
  px = x;
  py = y;
  viewport.setPointerCapture(event.pointerId);
});
viewport.addEventListener("pointermove", event => {
  if (!dragging) return;
  x = px + event.clientX - sx;
  y = py + event.clientY - sy;
  scheduleTransform();
});
viewport.addEventListener("pointerup", () => {
  dragging = false;
  viewport.classList.remove("dragging");
});
viewport.addEventListener("pointercancel", () => {
  dragging = false;
  viewport.classList.remove("dragging");
});
viewport.addEventListener("wheel", event => {
  event.preventDefault();
  if (event.metaKey || event.ctrlKey) {
    const oldScale = scale;
    const next = event.deltaY < 0 ? 1.08 : .92;
    scale = Math.max(.16, Math.min(1.15, scale * next));
    const rect = viewport.getBoundingClientRect();
    const cx = event.clientX - rect.left;
    const cy = event.clientY - rect.top;
    x = cx - (cx - x) * (scale / oldScale);
    y = cy - (cy - y) * (scale / oldScale);
  } else {
    x -= event.deltaX;
    y -= event.deltaY;
  }
  scheduleTransform();
}, {passive: false});
document.getElementById("zoom-in").addEventListener("click", () => {
  scale = Math.min(1.15, scale * 1.12);
  scheduleTransform();
});
document.getElementById("zoom-out").addEventListener("click", () => {
  scale = Math.max(.16, scale * .88);
  scheduleTransform();
});
document.getElementById("fit").addEventListener("click", fitCanvas);
document.getElementById("reset").addEventListener("click", () => {
  scale = .7;
  x = 18;
  y = 18;
  scheduleTransform();
});
document.getElementById("jump").addEventListener("click", event => {
  const link = event.target.closest("a");
  if (!link) return;
  event.preventDefault();
  const target = document.querySelector(link.getAttribute("href"));
  if (!target) return;
  x = 18;
  y = 18 - target.offsetTop * scale;
  scheduleTransform();
});
applyTransform();
</script>
